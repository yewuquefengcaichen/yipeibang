<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>记忆管理 - 医陪帮</title>
  <link rel="stylesheet" href="./styles/main.css">
</head>
<body>
  <!-- 侧边栏 -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
          </svg>
        </div>
        <span class="logo-text">医陪帮</span>
      </div>
      <button class="new-chat-btn" onclick="location.href='index.html'">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        <span>返回对话</span>
      </button>
    </div>

    <div class="chat-history">
      <div class="history-title">记忆分类</div>
      <div class="history-item" data-category="all">全部记忆</div>
      <div class="history-item" data-category="个人信息">个人信息</div>
      <div class="history-item" data-category="疾病信息">疾病信息</div>
      <div class="history-item" data-category="用药信息">用药信息</div>
      <div class="history-item" data-category="检查信息">检查信息</div>
      <div class="history-item" data-category="就医信息">就医信息</div>
      <div class="history-item" data-category="偏好">偏好</div>
      <div class="history-item" data-category="注意事项">注意事项</div>
    </div>

    <div class="sidebar-footer">
      <div class="user-menu">
        <div class="avatar">陈</div>
        <div class="user-info">
          <div class="user-name">陈阿姨</div>
          <div class="user-status">糖尿病患者</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- 主内容区域 -->
  <main class="main-content">
    <!-- 顶部栏 -->
    <div class="top-bar">
      <h2 style="margin: 0; font-size: 20px; font-weight: 600;">记忆管理</h2>

      <div class="spacer"></div>

      <button class="feature-btn" onclick="loadMemories()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/>
        </svg>
        刷新
      </button>

      <button class="feature-btn" onclick="showAddMemoryModal()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 5v14M5 12h14"/>
        </svg>
        添加记忆
      </button>
    </div>

    <div class="chat-container" style="padding: 24px;">
      <!-- 搜索栏 -->
      <div style="max-width: 1200px; margin: 0 auto 32px;">
        <div class="input-wrapper" style="max-width: 600px; margin: 0 auto;">
          <input
            type="text"
            id="searchInput"
            placeholder="搜索记忆..."
            style="flex: 1; border: none; background: transparent; font-size: 16px; padding: 12px;"
          >
          <button class="send-btn" onclick="searchMemories()" style="width: 40px; height: 40px;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/>
              <path d="m21 21-4.35-4.35"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- 统计信息 -->
      <div id="stats" style="max-width: 1200px; margin: 0 auto 32px;">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px;">
          <div class="card" style="text-align: center;">
            <div style="font-size: 32px; font-weight: 700; color: var(--color-primary);" id="totalCount">0</div>
            <div style="font-size: 14px; color: var(--text-secondary); margin-top: 8px;">总记忆数</div>
          </div>
          <div class="card" style="text-align: center;">
            <div style="font-size: 32px; font-weight: 700; color: var(--color-secondary);" id="categoryCount">0</div>
            <div style="font-size: 14px; color: var(--text-secondary); margin-top: 8px;">分类数</div>
          </div>
          <div class="card" style="text-align: center;">
            <div style="font-size: 32px; font-weight: 700; color: var(--color-accent);" id="todayCount">0</div>
            <div style="font-size: 14px; color: var(--text-secondary); margin-top: 8px;">今日新增</div>
          </div>
        </div>
      </div>

      <!-- 记忆卡片网格 -->
      <div id="memoriesGrid" style="max-width: 1200px; margin: 0 auto;">
        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px;">
          <!-- 动态插入记忆卡片 -->
        </div>
      </div>

      <!-- 空状态 -->
      <div id="emptyState" style="display: none; text-align: center; padding: 64px 24px;">
        <div style="font-size: 48px; margin-bottom: 16px;">📝</div>
        <h3 style="margin-bottom: 8px;">暂无记忆</h3>
        <p style="color: var(--text-secondary);">系统会自动从对话中提取重要信息，也可手动添加记忆</p>
        <button class="btn btn-primary" onclick="showAddMemoryModal()" style="margin-top: 24px;">
          添加第一条记忆
        </button>
      </div>
    </div>
  </main>

  <script>
    let allMemories = [];
    let currentCategory = 'all';

    // 页面加载时获取记忆
    document.addEventListener('DOMContentLoaded', () => {
      loadMemories();
      initCategoryFilters();
      initSearch();
    });

    function initCategoryFilters() {
      document.querySelectorAll('[data-category]').forEach(item => {
        item.addEventListener('click', () => {
          currentCategory = item.dataset.category;
          document.querySelectorAll('[data-category]').forEach(el => el.classList.remove('active'));
          item.classList.add('active');
          filterMemories();
        });
      });
    }

    function initSearch() {
      const searchInput = document.getElementById('searchInput');
      searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          searchMemories();
        }
      });
    }

    async function loadMemories() {
      try {
        const response = await fetch('/api/memory/list');
        const data = await response.json();
        allMemories = data.memories || [];
        updateStats();
        filterMemories();
      } catch (error) {
        console.error('Failed to load memories:', error);
      }
    }

    function updateStats() {
      document.getElementById('totalCount').textContent = allMemories.length;

      const categories = new Set(allMemories.map(m => m.category));
      document.getElementById('categoryCount').textContent = categories.size;

      const today = new Date().toISOString().split('T')[0];
      const todayMemories = allMemories.filter(m => m.created_at && m.created_at.startsWith(today));
      document.getElementById('todayCount').textContent = todayMemories.length;
    }

    function filterMemories() {
      let filtered = allMemories;

      // 分类过滤
      if (currentCategory !== 'all') {
        filtered = filtered.filter(m => m.category === currentCategory);
      }

      renderMemories(filtered);
    }

    function searchMemories() {
      const query = document.getElementById('searchInput').value.trim().toLowerCase();
      if (!query) {
        filterMemories();
        return;
      }

      const filtered = allMemories.filter(m =>
        m.content.toLowerCase().includes(query) ||
        m.category.toLowerCase().includes(query)
      );

      renderMemories(filtered);
    }

    function renderMemories(memories) {
      const grid = document.getElementById('memoriesGrid').querySelector('div');
      const emptyState = document.getElementById('emptyState');

      if (memories.length === 0) {
        grid.innerHTML = '';
        emptyState.style.display = 'block';
        return;
      }

      emptyState.style.display = 'none';

      grid.innerHTML = memories.map(memory => `
        <div class="card" style="padding: 20px;">
          <div style="display: flex; justify-content: between; align-items: start; margin-bottom: 12px;">
            <span class="badge badge-info" style="font-size: 11px;">${escapeHtml(memory.category)}</span>
            <button onclick="deleteMemory('${memory.id}')" style="background: none; border: none; color: var(--text-tertiary); cursor: pointer; padding: 0; margin-left: auto;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
              </svg>
            </button>
          </div>
          <p style="margin: 0; line-height: 1.6; color: var(--text-primary);">${escapeHtml(memory.content)}</p>
          <div style="margin-top: 12px; font-size: 12px; color: var(--text-tertiary);">
            ${formatDate(memory.created_at)}
          </div>
        </div>
      `).join('');
    }

    async function deleteMemory(id) {
      if (!confirm('确定要删除这条记忆吗？')) return;

      try {
        await fetch(`/api/memory/${id}`, { method: 'DELETE' });
        loadMemories();
      } catch (error) {
        alert('删除失败');
      }
    }

    function showAddMemoryModal() {
      const content = prompt('请输入记忆内容：');
      if (!content) return;

      const category = prompt('请选择分类（个人信息/疾病信息/用药信息/检查信息/就医信息/偏好/注意事项）：', '其他');

      addMemory(content, category);
    }

    async function addMemory(content, category) {
      try {
        await fetch('/api/memory/create', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content, category })
        });
        loadMemories();
      } catch (error) {
        alert('添加失败');
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const date = new Date(dateStr);
      const now = new Date();
      const diff = now - date;
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));

      if (days === 0) return '今天';
      if (days === 1) return '昨天';
      if (days < 7) return `${days}天前`;
      return date.toLocaleDateString('zh-CN');
    }
  </script>
</body>
</html>
